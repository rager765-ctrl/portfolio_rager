<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — Kwabs Store Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══ Top App Bar ═══ -->
  <header class="top-app-bar glass">
    <div style="display:flex;align-items:center;gap:1rem;">
      <a href="admin-dashboard.html" class="icon-btn">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <span class="top-app-bar__title font-headline">Orders</span>
    </div>
  </header>

  <!-- ═══ Main Content ═══ -->
  <main class="page-content page-content--admin">

    <div style="margin-bottom:2rem;">
      <p class="text-label-md" style="color:var(--outline);margin-bottom:0.25rem;">Operations</p>
      <h2 class="font-headline text-headline-lg">Order Management</h2>
    </div>

    <!-- Filter Chips -->
    <div class="category-pills" style="margin-bottom:1.5rem;" id="statusFilters">
      <button class="category-pill active" data-status="all">All</button>
      <button class="category-pill" data-status="pending">Pending</button>
      <button class="category-pill" data-status="confirmed">Confirmed</button>
      <button class="category-pill" data-status="shipped">Shipped</button>
      <button class="category-pill" data-status="delivered">Delivered</button>
    </div>

    <!-- Order Count -->
    <p class="text-label-md" style="color:var(--outline);margin-bottom:1rem;"><span id="orderCount">0</span> ORDERS</p>

    <!-- Order List -->
    <div id="orderList" style="display:flex;flex-direction:column;gap:1rem;"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <span class="material-symbols-outlined empty-state__icon">receipt_long</span>
      <p class="empty-state__title">No orders found</p>
      <p class="empty-state__text">Orders will appear here when customers place them via the store or WhatsApp.</p>
    </div>

  </main>

  <!-- ═══ Order Detail Modal ═══ -->
  <div class="modal-overlay" id="orderDetailModal" onclick="if(event.target===this) this.classList.remove('open')">
    <div class="modal-content" style="max-height:90dvh;">
      <div class="modal-handle"></div>
      <div id="orderDetailContent"></div>
    </div>
  </div>

  <!-- ═══ Admin Bottom Nav ═══ -->
  <nav class="bottom-nav-admin">
    <a href="admin-dashboard.html" class="bottom-nav-admin__item">
      <span class="material-symbols-outlined" style="font-size:1.25rem;">dashboard</span>
      <span>Stats</span>
    </a>
    <a href="admin-products.html" class="bottom-nav-admin__item">
      <span class="material-symbols-outlined" style="font-size:1.25rem;">inventory_2</span>
      <span>Products</span>
    </a>
    <a href="admin-categories.html" class="bottom-nav-admin__item">
      <span class="material-symbols-outlined" style="font-size:1.25rem;">category</span>
      <span>Categories</span>
    </a>
    <a href="admin-orders.html" class="bottom-nav-admin__item active">
      <span class="material-symbols-outlined filled" style="font-size:1.25rem;">receipt_long</span>
      <span>Orders</span>
    </a>
  </nav>

  <script src="store.js"></script>
  <script src="utils.js"></script>
  <script>
    KwabsStore.initializeSeedData();
    if (!KwabsUtils.requireAdmin()) { /* redirects */ }

    let activeStatus = 'all';

    // ─── Status Config ────────────────────────────────────────
    const STATUS_CONFIG = {
      pending:   { label: 'Pending',   icon: 'schedule',       chipClass: 'chip--warning',  next: 'confirmed' },
      confirmed: { label: 'Confirmed', icon: 'check_circle',   chipClass: 'chip--primary',  next: 'shipped' },
      shipped:   { label: 'Shipped',   icon: 'local_shipping', chipClass: 'chip--surface',  next: 'delivered' },
      delivered: { label: 'Delivered', icon: 'done_all',       chipClass: 'chip--success',  next: null },
    };

    // ─── Filter Chips ─────────────────────────────────────────
    document.getElementById('statusFilters').addEventListener('click', (e) => {
      const pill = e.target.closest('.category-pill');
      if (!pill) return;
      activeStatus = pill.dataset.status;
      document.querySelectorAll('#statusFilters .category-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderOrders();
    });

    // ─── Render Orders ────────────────────────────────────────
    function renderOrders() {
      let orders = KwabsStore.getOrders();

      if (activeStatus !== 'all') {
        orders = orders.filter(o => o.status === activeStatus);
      }

      const container = document.getElementById('orderList');
      const empty = document.getElementById('emptyState');
      document.getElementById('orderCount').textContent = orders.length;

      if (orders.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'flex';
        return;
      }

      empty.style.display = 'none';

      container.innerHTML = orders.map(order => {
        const config = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending;
        const itemCount = order.items.reduce((sum, i) => sum + i.quantity, 0);

        return `
          <div style="background:var(--surface-container-lowest);border-radius:var(--radius-xl);padding:1.25rem;box-shadow:var(--shadow-soft);cursor:pointer;"
            onclick="showOrderDetail('${order.id}')">

            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;">
              <div>
                <p class="font-headline" style="font-weight:700;font-size:1rem;">${order.order_number}</p>
                <p style="font-size:0.6875rem;color:var(--outline);">${KwabsUtils.formatDate(order.created_at)} • ${KwabsUtils.timeAgo(order.created_at)}</p>
              </div>
              <span class="chip ${config.chipClass}">
                <span class="material-symbols-outlined" style="font-size:0.75rem;">${config.icon}</span>
                ${config.label}
              </span>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <p style="font-size:0.8125rem;font-weight:600;">${order.customer.name}</p>
                <p style="font-size:0.6875rem;color:var(--outline);">${itemCount} item${itemCount !== 1 ? 's' : ''}</p>
              </div>
              <span class="font-headline" style="font-weight:800;font-size:1.125rem;">${KwabsUtils.formatPrice(order.total_price)}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // ─── Order Detail ─────────────────────────────────────────
    function showOrderDetail(orderId) {
      const order = KwabsStore.getOrders().find(o => o.id === orderId);
      if (!order) return;

      const config = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending;
      const content = document.getElementById('orderDetailContent');

      content.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;">
          <div>
            <h3 class="font-headline text-headline-md">${order.order_number}</h3>
            <p class="text-body-sm" style="color:var(--outline);">${KwabsUtils.formatDate(order.created_at)}</p>
          </div>
          <span class="chip ${config.chipClass}">
            <span class="material-symbols-outlined" style="font-size:0.75rem;">${config.icon}</span>
            ${config.label}
          </span>
        </div>

        <!-- Customer Info -->
        <div style="background:var(--surface-container-low);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1.5rem;">
          <p class="text-label-sm" style="color:var(--outline);margin-bottom:0.75rem;">CUSTOMER</p>
          <p style="font-weight:600;font-size:0.9375rem;margin-bottom:0.25rem;">${order.customer.name}</p>
          <p style="font-size:0.8125rem;color:var(--on-surface-variant);">📞 ${order.customer.phone}</p>
          <p style="font-size:0.8125rem;color:var(--on-surface-variant);">📍 ${order.customer.address}</p>
        </div>

        <!-- Items -->
        <div style="margin-bottom:1.5rem;">
          <p class="text-label-sm" style="color:var(--outline);margin-bottom:0.75rem;">ITEMS</p>
          ${order.items.map(item => `
            <div style="display:flex;align-items:center;gap:0.75rem;padding:0.625rem 0;">
              <img src="${item.image_url}" alt="${item.name}" style="width:2.5rem;height:2.5rem;border-radius:var(--radius-md);object-fit:cover;" />
              <div style="flex:1;">
                <p style="font-weight:600;font-size:0.8125rem;">${item.name}</p>
                <p style="font-size:0.6875rem;color:var(--outline);">Qty: ${item.quantity} × ${KwabsUtils.formatPrice(item.price)}</p>
              </div>
              <span style="font-weight:700;font-size:0.8125rem;">${KwabsUtils.formatPrice(item.price * item.quantity)}</span>
            </div>
          `).join('')}
        </div>

        <!-- Total -->
        <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;background:var(--surface-container-low);border-radius:var(--radius-lg);margin-bottom:2rem;">
          <span class="font-headline" style="font-weight:700;">Total</span>
          <span class="font-headline" style="font-weight:800;font-size:1.375rem;">${KwabsUtils.formatPrice(order.total_price)}</span>
        </div>

        <!-- Status Update -->
        <div style="display:flex;flex-direction:column;gap:0.75rem;">
          ${config.next ? `
            <button class="btn-primary" onclick="updateStatus('${order.id}', '${config.next}')">
              <span class="material-symbols-outlined" style="font-size:1.125rem;">${STATUS_CONFIG[config.next].icon}</span>
              Mark as ${STATUS_CONFIG[config.next].label}
            </button>
          ` : `
            <div style="text-align:center;padding:1rem;background:var(--surface-container-low);border-radius:var(--radius-lg);">
              <span class="material-symbols-outlined" style="color:#166534;font-size:2rem;margin-bottom:0.5rem;">task_alt</span>
              <p class="font-headline" style="font-weight:700;">Order Complete</p>
            </div>
          `}

          <button class="btn-whatsapp" onclick="resendWhatsApp('${order.id}')" style="font-size:0.8125rem;padding:0.875rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Resend via WhatsApp
          </button>
        </div>
      `;

      document.getElementById('orderDetailModal').classList.add('open');
    }

    function updateStatus(orderId, newStatus) {
      KwabsStore.updateOrderStatus(orderId, newStatus);
      const config = STATUS_CONFIG[newStatus];
      KwabsUtils.toast(`Order marked as ${config.label}`);
      document.getElementById('orderDetailModal').classList.remove('open');
      renderOrders();
    }

    function resendWhatsApp(orderId) {
      const order = KwabsStore.getOrders().find(o => o.id === orderId);
      if (order) {
        KwabsStore.sendOrderViaWhatsApp(order);
      }
    }

    renderOrders();
  </script>
</body>
</html>
