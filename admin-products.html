<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Products — Kwabs Store Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══ Top App Bar ═══ -->
  <header class="top-app-bar glass">
    <div style="display:flex;align-items:center;gap:1rem;">
      <a href="admin-dashboard.html" class="icon-btn">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <span class="top-app-bar__title font-headline">Products</span>
    </div>
    <div class="top-app-bar__actions">
      <a href="admin-add-product.html" class="icon-btn" title="Add Product" style="background:var(--primary);color:var(--on-primary);border-radius:var(--radius-lg);">
        <span class="material-symbols-outlined" style="font-size:1.25rem;">add</span>
      </a>
    </div>
  </header>

  <!-- ═══ Main Content ═══ -->
  <main class="page-content page-content--admin">

    <!-- Search & Filter -->
    <section style="margin-bottom:2rem;">
      <div style="position:relative;margin-bottom:1rem;">
        <div style="position:absolute;top:50%;left:1rem;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:var(--outline);font-size:1.25rem;">search</span>
        </div>
        <input id="searchInput" type="text" class="minimal-input" placeholder="Search products..."
          style="padding-left:3rem;border-radius:var(--radius-xl);height:3rem;font-size:0.875rem;border-bottom:none;" />
      </div>
      <div class="category-pills" id="filterPills"></div>
    </section>

    <!-- Product Count -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <p class="text-label-md" style="color:var(--outline);"><span id="productCount">0</span> PRODUCTS</p>
    </div>

    <!-- Product List -->
    <div class="data-list" id="productList"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <span class="material-symbols-outlined empty-state__icon">inventory_2</span>
      <p class="empty-state__title">No products found</p>
      <p class="empty-state__text">Add your first product to get started.</p>
      <a href="admin-add-product.html" class="btn-primary" style="width:auto;padding:1rem 2rem;margin-top:1.5rem;font-size:0.8125rem;">
        Add Product
      </a>
    </div>

  </main>

  <!-- ═══ Delete Confirmation Modal ═══ -->
  <div class="modal-overlay" id="deleteModal" onclick="if(event.target===this) this.classList.remove('open')">
    <div class="modal-content" style="max-width:24rem;border-radius:var(--radius-xl);padding:2rem;">
      <div class="modal-handle"></div>
      <h3 class="font-headline text-headline-sm" style="margin-bottom:0.5rem;">Delete Product?</h3>
      <p class="text-body-sm" style="color:var(--outline);margin-bottom:2rem;">This action cannot be undone. The product will be permanently removed.</p>
      <div style="display:flex;gap:0.75rem;">
        <button class="btn-secondary" style="flex:1;" onclick="document.getElementById('deleteModal').classList.remove('open')">Cancel</button>
        <button class="btn-danger" style="flex:1;" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- ═══ Admin Bottom Nav ═══ -->
  <nav class="bottom-nav-admin">
    <a href="admin-dashboard.html" class="bottom-nav-admin__item">
      <span class="material-symbols-outlined" style="font-size:1.25rem;">dashboard</span>
      <span>Stats</span>
    </a>
    <a href="admin-products.html" class="bottom-nav-admin__item active">
      <span class="material-symbols-outlined filled" style="font-size:1.25rem;">inventory_2</span>
      <span>Products</span>
    </a>
    <a href="admin-categories.html" class="bottom-nav-admin__item">
      <span class="material-symbols-outlined" style="font-size:1.25rem;">category</span>
      <span>Categories</span>
    </a>
    <a href="admin-orders.html" class="bottom-nav-admin__item">
      <span class="material-symbols-outlined" style="font-size:1.25rem;">receipt_long</span>
      <span>Orders</span>
    </a>
  </nav>

  <script src="store.js"></script>
  <script src="utils.js"></script>
  <script>
    KwabsStore.initializeSeedData();
    if (!KwabsUtils.requireAdmin()) { /* redirects */ }

    let activeFilter = 'all';
    let searchQuery = '';
    let deleteTargetId = null;

    // ─── Render Filter Pills ──────────────────────────────────
    function renderFilters() {
      const categories = KwabsStore.getCategories();
      const container = document.getElementById('filterPills');
      container.innerHTML = `<button class="category-pill ${activeFilter === 'all' ? 'active' : ''}" data-cat="all">All</button>` +
        categories.map(c => `<button class="category-pill ${activeFilter === c.id ? 'active' : ''}" data-cat="${c.id}">${c.name}</button>`).join('');

      container.querySelectorAll('.category-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          activeFilter = pill.dataset.cat;
          renderFilters();
          renderProducts();
        });
      });
    }

    // ─── Render Products ──────────────────────────────────────
    function renderProducts() {
      let products = activeFilter === 'all'
        ? KwabsStore.getProducts()
        : KwabsStore.getProductsByCategory(activeFilter);

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        products = products.filter(p => p.name.toLowerCase().includes(q));
      }

      const container = document.getElementById('productList');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('productCount');

      count.textContent = products.length;

      if (products.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'flex';
        return;
      }

      empty.style.display = 'none';

      container.innerHTML = products.map(p => {
        const cat = KwabsStore.getCategoryById(p.category_id);
        const discountedPrice = KwabsUtils.calcDiscountedPrice(p.price, p.discount);

        return `
          <div class="data-list__item">
            <img class="data-list__image" src="${p.image_url || ''}" alt="${p.name}"
              onerror="this.style.background='var(--surface-container-high)';this.src=''" />
            <div class="data-list__info">
              <p class="font-headline" style="font-weight:700;font-size:0.875rem;letter-spacing:-0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</p>
              <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem;">
                <span style="font-weight:700;font-size:0.8125rem;">${KwabsUtils.formatPrice(discountedPrice)}</span>
                ${p.discount > 0 ? `<span style="font-size:0.625rem;text-decoration:line-through;color:var(--outline);">${KwabsUtils.formatPrice(p.price)}</span>` : ''}
                <span class="chip ${p.in_stock ? 'chip--success' : 'chip--error'}" style="font-size:0.5625rem;padding:0.2rem 0.5rem;">
                  ${p.in_stock ? 'In Stock' : 'Out'}
                </span>
              </div>
              <p style="font-size:0.625rem;color:var(--outline);margin-top:0.25rem;">${cat ? cat.name : 'Uncategorized'} • Stock: ${p.stock}</p>
            </div>
            <div class="data-list__actions">
              <button class="btn-icon" style="width:2.25rem;height:2.25rem;" title="Toggle Stock"
                onclick="toggleStock('${p.id}')">
                <span class="material-symbols-outlined" style="font-size:1.125rem;color:${p.in_stock ? 'var(--primary)' : 'var(--error)'};">
                  ${p.in_stock ? 'visibility' : 'visibility_off'}
                </span>
              </button>
              <a href="admin-add-product.html?edit=${p.id}" class="btn-icon" style="width:2.25rem;height:2.25rem;" title="Edit">
                <span class="material-symbols-outlined" style="font-size:1.125rem;">edit</span>
              </a>
              <button class="btn-icon" style="width:2.25rem;height:2.25rem;" title="Delete"
                onclick="confirmDelete('${p.id}')">
                <span class="material-symbols-outlined" style="font-size:1.125rem;color:var(--error);">delete</span>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // ─── Actions ──────────────────────────────────────────────
    function toggleStock(id) {
      const product = KwabsStore.toggleProductStock(id);
      if (product) {
        KwabsUtils.toast(`${product.name} is now ${product.in_stock ? 'in stock' : 'out of stock'}`);
        renderProducts();
      }
    }

    function confirmDelete(id) {
      deleteTargetId = id;
      document.getElementById('deleteModal').classList.add('open');
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
      if (deleteTargetId) {
        KwabsStore.deleteProduct(deleteTargetId);
        KwabsUtils.toast('Product deleted');
        deleteTargetId = null;
        document.getElementById('deleteModal').classList.remove('open');
        renderProducts();
      }
    });

    // ─── Search ───────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', KwabsUtils.debounce((e) => {
      searchQuery = e.target.value.trim();
      renderProducts();
    }, 250));

    // ─── Init ─────────────────────────────────────────────────
    renderFilters();
    renderProducts();
  </script>
</body>
</html>
